<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Forex Global</title>
    <style>
        body {
            background-color: #0b132b;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .payment-box {
            background-color: #1c2541;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #00b4d8; margin-bottom: 20px; }
        .method {
            background-color: #3a506b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: left;
        }
        .method strong { color: #ffb703; }
        .input-group {
            margin-top: 20px;
            text-align: left;
        }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #cbd5e1; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #5c677d;
            background-color: #0b132b;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .btn-submit {
            background-color: #00b4d8;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #0077b6; }
    </style>
</head>
<body>

<div class="payment-box">
    <h2>Make Payment</h2>
    <p>নিচের যেকোনো একটি নাম্বারে <b>$100 (১২,০০০ টাকা)</b> Send Money করুন:</p>
    
    <!-- বিকাশ তথ্য -->
    <div class="method">
        <strong>bKash (Personal):</strong> 017XXXXXXXX <br>
        <small>ধাপ: সেন্ড মানি > নাম্বার দিন > পরিমাণ দিন</small>
    </div>

    <!-- নগদ তথ্য -->
    <div class="method">
        <strong>Nagad (Personal):</strong> 019XXXXXXXX <br>
        <small>ধাপ: সেন্ড মানি > নাম্বার দিন > পরিমাণ দিন</small>
    </div>

    <!-- সাবমিট ফর্ম -->
    <form action="javascript:alert('পেমেন্ট রিকোয়েস্ট সফলভাবে জমা হয়েছে! আপনার অ্যাকাউন্টটি ২৪ ঘণ্টার মধ্যে অ্যাক্টিভ হবে।')">
        <div class="input-group">
            <label for="number">আপনার বিকাশ/নগদ নাম্বার:</label>
            <input type="tel" id="number" placeholder="01XXXXXXXXX" required>
            
            <label for="txid">Transaction ID (TxID):</label>
            <input type="text" id="txid" placeholder="8X92KLOPS" required>
        </div>
        <button type="submit" class="btn-submit">Submit Payment</button>
    </form>
</div>

</body>
</html>
