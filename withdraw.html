<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | Forex Global</title>
    <style>
        body { background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .withdraw-card { background: #1c2541; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #00f2fe; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance-info { text-align: center; font-size: 1.5rem; margin-bottom: 25px; color: #00f2fe; font-weight: bold; text-shadow: 0 0 10px rgba(0,242,254,0.3); }
        .method-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .method-btn { flex: 1; padding: 12px 5px; border: 2px solid #3a506b; background: #0b132b; color: white; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        
        /* কালার সিলেকশন লজিক */
        .method-btn.active.bKash { background-color: #e91e63 !important; border-color: #e91e63 !important; }
        .method-btn.active.Nagad { background-color: #f44336 !important; border-color: #f44336 !important; }
        .method-btn.active.Rocket { background-color: #9c27b0 !important; border-color: #9c27b0 !important; }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #3a506b; background: #0b132b; color: white; box-sizing: border-box; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #0d6efd, #00f2fe); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="withdraw-card">
    <div class="balance-info" id="userBalance">Loading...</div>
    <div class="method-container">
        <button class="method-btn bKash" onclick="setMethod('bKash', this)">bKash</button>
        <button class="method-btn Nagad" onclick="setMethod('Nagad', this)">Nagad</button>
        <button class="method-btn Rocket" onclick="setMethod('Rocket', this)">Rocket</button>
    </div>
    <input type="number" id="wAmount" placeholder="Amount to Withdraw">
    <input type="text" id="wNumber" placeholder="Enter your number">
    <button class="submit-btn" onclick="requestWithdraw()">Submit Request</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKgUEN3eCEQIm07JejOr4kM0yOBEGGdR8",
        authDomain: "forexglobal-95dfc.firebaseapp.com",
        projectId: "forexglobal-95dfc",
        storageBucket: "forexglobal-95dfc.firebasestorage.app",
        messagingSenderId: "87470977908",
        appId: "1:87470977908:web:4b7f316b372327ffa87221"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let selectedMethod = "";

    function setMethod(method, btn) {
        selectedMethod = method;
        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    auth.onAuthStateChanged((user) => {
        if (user) {
            db.collection("users").doc(user.uid).onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById('userBalance').innerText = "Balance: Tk." + doc.data().balance;
                }
            });
        } else {
            window.location.href = "index.html";
        }
    });

    async function requestWithdraw() {
        if (!selectedMethod) { alert("Please select a method!"); return; }
        const amount = parseFloat(document.getElementById('wAmount').value);
        const number = document.getElementById('wNumber').value;
        const user = auth.currentUser;

        if(!amount || !number) { alert("Please enter amount and number"); return; }
        
        await db.collection("withdraw_requests").add({
            uid: user.uid,
            method: selectedMethod,
            amount: amount,
            number: number,
            status: "pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Withdraw Request Submitted Successfully!");
        document.getElementById('wAmount').value = '';
        document.getElementById('wNumber').value = '';
    }
</script>
</body>
</html>
